name: collect-issues

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 UTC 21:00 = 한국시간 06:00
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect recent issues (Google News RSS, last 1 day)
        run: python collect_issues.py

      - name: Commit issues.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issues.json
          if git diff --staged --quiet; then
            echo "No changes to issues.json"
          else
            git commit -m "chore: update issues.json ($(date -u +%Y-%m-%d))"
            git push
          fi
